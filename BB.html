<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BuilderBuilder</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7f6;
      --panel: #ffffff;
      --ink: #172026;
      --muted: #61707c;
      --line: #d9e0e4;
      --accent: #0f766e;
      --accent-strong: #0b5c56;
      --warning: #9a3412;
      --code-bg: #111821;
      --code-bar: #172231;
      --code-ink: #ecf2f8;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
    }

    button,
    input {
      font: inherit;
    }

    .app {
      display: grid;
      grid-template-columns: minmax(380px, 560px) minmax(0, 1fr);
      min-height: 100vh;
    }

    .controls {
      border-right: 1px solid var(--line);
      background: var(--panel);
      padding: 28px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 26px;
    }

    .mark {
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      border-radius: 8px;
      background: var(--ink);
      color: white;
      font-weight: 800;
      letter-spacing: 0;
    }

    h1 {
      margin: 0;
      font-size: 1.45rem;
      line-height: 1.15;
    }

    .subtitle {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.45;
    }

    .field {
      display: grid;
      gap: 8px;
      margin-bottom: 17px;
    }

    label,
    .group-label {
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 750;
    }

    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: white;
      color: var(--ink);
      padding: 11px 12px;
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgb(15 118 110 / 14%);
    }

    .parameters {
      display: grid;
      gap: 10px;
      margin-bottom: 17px;
    }

    .parameter-head,
    .parameter-row {
      display: grid;
      grid-template-columns: 42px minmax(0, 0.9fr) minmax(0, 0.9fr) minmax(0, 1fr) 42px;
      gap: 8px;
      align-items: center;
    }

    .parameter-head {
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 800;
      padding-right: 2px;
    }

    .parameter-row input {
      min-width: 0;
    }

    .parameter-row {
      border-radius: 8px;
    }

    .parameter-row.dragging {
      opacity: 0.48;
    }

    .parameter-row.drop-target {
      outline: 2px solid rgb(15 118 110 / 34%);
      outline-offset: 2px;
    }

    .icon-button {
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: white;
      color: var(--ink);
      cursor: pointer;
      font-size: 1.12rem;
      font-weight: 800;
      line-height: 1;
    }

    .icon-button:hover,
    .icon-button:focus {
      border-color: var(--accent);
      color: var(--accent-strong);
      outline: none;
    }

    .drag-handle {
      color: var(--muted);
      cursor: grab;
    }

    .drag-handle:active {
      cursor: grabbing;
    }

    .add-row {
      justify-self: start;
      color: var(--accent-strong);
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 22px;
    }

    .button {
      min-height: 42px;
      border: 1px solid var(--accent);
      border-radius: 8px;
      background: var(--accent);
      color: white;
      cursor: pointer;
      font-weight: 800;
      padding: 10px 14px;
    }

    .button.secondary {
      background: transparent;
      color: var(--accent-strong);
    }

    .preview {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 18px;
      min-width: 0;
      padding: 28px;
    }

    .preview-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-width: 0;
    }

    .preview-title {
      display: grid;
      gap: 4px;
      min-width: 0;
    }

    .preview-title h2 {
      margin: 0;
      font-size: 1rem;
      color: var(--muted);
    }

    .meta {
      overflow: hidden;
      color: var(--ink);
      font-size: 0.92rem;
      font-weight: 800;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .status {
      min-height: 1.3em;
      color: var(--accent-strong);
      font-size: 0.9rem;
      font-weight: 800;
      text-align: right;
    }

    .status.warning {
      color: var(--warning);
    }

    .snippet {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      overflow: hidden;
      min-width: 0;
      border: 1px solid #0d131b;
      border-radius: 8px;
      background: var(--code-bg);
      box-shadow: 0 18px 42px rgb(23 32 38 / 14%);
    }

    .snippet-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid rgb(255 255 255 / 9%);
      background: var(--code-bar);
      padding: 12px 16px;
      color: white;
    }

    .snippet-title {
      overflow: hidden;
      font-weight: 800;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .snippet-language {
      color: #9fb0c1;
      font-size: 0.82rem;
      font-weight: 800;
      text-transform: uppercase;
    }

    pre {
      margin: 0;
      overflow: auto;
      min-width: 0;
      padding: 18px;
      color: var(--code-ink);
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      font-size: 0.88rem;
      line-height: 1.62;
      tab-size: 4;
    }

    @media (max-width: 860px) {
      .app {
        grid-template-columns: 1fr;
      }

      .controls {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .preview {
        min-height: 70vh;
      }
    }

    @media (max-width: 520px) {
      .parameter-head {
        display: none;
      }

      .parameter-row {
        grid-template-columns: 42px 1fr 1fr 1fr 42px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="controls" aria-label="入力">
      <div class="brand">
        <div class="mark" aria-hidden="true">BB</div>
        <div>
          <h1>BuilderBuilder</h1>
          <p class="subtitle">MSTest DynamicData Builder</p>
        </div>
      </div>

      <div class="field">
        <label for="functionName">関数名</label>
        <input id="functionName" value="CalculatePrice" autocomplete="off">
      </div>

      <div class="parameters" aria-label="パラメータ">
        <div class="group-label">パラメータ</div>
        <div class="parameter-head" aria-hidden="true">
          <div></div>
          <div>型</div>
          <div>パラメータ名</div>
          <div>初期値</div>
          <div></div>
        </div>
        <div id="parameterList"></div>
        <button class="icon-button add-row" id="addParameter" type="button" title="パラメータを追加" aria-label="パラメータを追加">+</button>
      </div>

      <div class="actions">
        <button class="button" id="copySnippet" type="button">スニペットをコピー</button>
        <button class="button secondary" id="clearInputs" type="button">クリア</button>
      </div>
    </section>

    <section class="preview" aria-label="プレビュー">
      <div class="preview-bar">
        <div class="preview-title">
          <h2>プレビュー</h2>
          <div class="meta" id="previewMeta"></div>
        </div>
        <div class="status" id="status" role="status" aria-live="polite"></div>
      </div>

      <article class="snippet">
        <header class="snippet-header">
          <div class="snippet-title" id="snippetTitle"></div>
          <div class="snippet-language">C# / MSTest</div>
        </header>
        <pre><code id="previewCode"></code></pre>
      </article>
    </section>
  </main>

  <script>
    const functionNameInput = document.querySelector("#functionName");
    const parameterList = document.querySelector("#parameterList");
    const addParameterButton = document.querySelector("#addParameter");
    const previewMeta = document.querySelector("#previewMeta");
    const previewCode = document.querySelector("#previewCode");
    const snippetTitle = document.querySelector("#snippetTitle");
    const status = document.querySelector("#status");
    const copyButton = document.querySelector("#copySnippet");
    const clearButton = document.querySelector("#clearInputs");

    const storageKey = "builderbuilder:mstest-dynamicdata:v1";
    const defaultState = {
      functionName: "CalculatePrice",
      parameterRows: [
        { type: "string", name: "name", initialValue: "" },
        { type: "int", name: "num", initialValue: "" },
        { type: "bool", name: "flg", initialValue: "" },
        { type: "HashMap", name: "data", initialValue: "" }
      ]
    };

    let parameterRows = defaultState.parameterRows.map((row) => ({ ...row }));
    let draggedParameterIndex = null;

    const csharpKeywords = new Set([
      "abstract", "as", "base", "bool", "break", "byte", "case", "catch",
      "char", "checked", "class", "const", "continue", "decimal", "default",
      "delegate", "do", "double", "else", "enum", "event", "explicit",
      "extern", "false", "finally", "fixed", "float", "for", "foreach", "goto",
      "if", "implicit", "in", "int", "interface", "internal", "is", "lock",
      "long", "namespace", "new", "null", "object", "operator", "out",
      "override", "params", "private", "protected", "public", "readonly",
      "ref", "return", "sbyte", "sealed", "short", "sizeof", "stackalloc",
      "static", "string", "struct", "switch", "this", "throw", "true", "try",
      "typeof", "uint", "ulong", "unchecked", "unsafe", "ushort", "using",
      "virtual", "void", "volatile", "while"
    ]);

    const cloneRows = (rows) => rows.map((row) => ({
      type: row.type,
      name: row.name,
      initialValue: row.initialValue || ""
    }));

    const cloneState = (state) => ({
      functionName: state.functionName,
      parameterRows: cloneRows(state.parameterRows)
    });

    const isPreviousDefaultRows = (rows) => {
      const previousRows = [
        { type: "string", name: "name" },
        { type: "int", name: "num" },
        { type: "HashMap", name: "data" }
      ];
      return rows.length === previousRows.length && rows.every((row, index) => (
        row.type === previousRows[index].type
        && row.name === previousRows[index].name
        && !row.initialValue
      ));
    };

    const normalizeState = (state) => {
      const fallback = cloneState(defaultState);
      if (!state || typeof state !== "object") {
        return fallback;
      }

      const functionName = typeof state.functionName === "string"
        ? state.functionName
        : fallback.functionName;
      const parameterRows = Array.isArray(state.parameterRows) && state.parameterRows.length
        ? state.parameterRows.map((row) => ({
          type: row && typeof row.type === "string" ? row.type : "",
          name: row && typeof row.name === "string" ? row.name : "",
          initialValue: row && typeof row.initialValue === "string" ? row.initialValue : ""
        }))
        : fallback.parameterRows;

      return {
        functionName,
        parameterRows: isPreviousDefaultRows(parameterRows)
          ? fallback.parameterRows
          : parameterRows
      };
    };

    const getStorage = () => {
      try {
        return window.localStorage;
      } catch (error) {
        return null;
      }
    };

    const loadState = () => {
      const storage = getStorage();
      if (!storage) {
        return cloneState(defaultState);
      }

      const rawState = storage.getItem(storageKey);
      if (!rawState) {
        return cloneState(defaultState);
      }

      try {
        return normalizeState(JSON.parse(rawState));
      } catch (error) {
        return cloneState(defaultState);
      }
    };

    const currentState = () => ({
      functionName: functionNameInput.value,
      parameterRows: cloneRows(parameterRows)
    });

    const saveState = () => {
      const storage = getStorage();
      if (!storage) {
        return;
      }

      storage.setItem(storageKey, JSON.stringify(currentState()));
    };

    const sanitizeIdentifier = (value, fallback) => {
      const normalized = (value || "")
        .trim()
        .replace(/[^A-Za-z0-9_]/g, "_")
        .replace(/_+/g, "_")
        .replace(/^_+|_+$/g, "");
      const safe = normalized || fallback;
      const prefixed = /^[A-Za-z_]/.test(safe) ? safe : `_${safe}`;
      return csharpKeywords.has(prefixed) ? `@${prefixed}` : prefixed;
    };

    const toPascalCase = (value, fallback) => {
      const safe = sanitizeIdentifier(value, fallback).replace(/^@/, "");
      return safe
        .split("_")
        .filter(Boolean)
        .map((part) => part.charAt(0).toUpperCase() + part.slice(1))
        .join("") || fallback;
    };

    const indent = (value, spaces) => {
      const padding = " ".repeat(spaces);
      return value.split("\n").map((line) => line ? `${padding}${line}` : line).join("\n");
    };

    const uniqueParameters = (rows) => {
      const used = new Map();
      return rows
        .map((row, index) => ({
          rawName: row.name.trim(),
          rawType: row.type.trim(),
          name: sanitizeIdentifier(row.name, `value${index + 1}`),
          type: row.type.trim() || "object",
          initialValue: row.initialValue.trim()
        }))
        .filter((parameter) => parameter.rawName || parameter.rawType)
        .map((parameter) => {
          const count = used.get(parameter.name) || 0;
          used.set(parameter.name, count + 1);
          return count === 0 ? parameter : { ...parameter, name: `${parameter.name}${count + 1}` };
        });
    };

    const isHashMapType = (type) => {
      const compactType = type
        .trim()
        .replace(/\?$/, "")
        .replace(/\s+/g, "");
      return /^(?:[A-Za-z_][A-Za-z0-9_]*\.)*HashMap(?:<.+>)?$/i.test(compactType);
    };

    const defaultValueFor = (type) => {
      const normalized = type.replace(/\?$/, "").trim().toLowerCase();
      if (isHashMapType(type)) {
        return "new()";
      }
      if (normalized === "string") {
        return "\"\"";
      }
      if (normalized === "char") {
        return "'\\0'";
      }
      if (normalized === "bool" || normalized === "boolean") {
        return "false";
      }
      if (normalized === "decimal") {
        return "0m";
      }
      if (normalized === "float" || normalized === "single") {
        return "0f";
      }
      if (normalized === "double") {
        return "0d";
      }
      if (["byte", "sbyte", "short", "ushort", "int", "uint", "long", "ulong"].includes(normalized)) {
        return "0";
      }
      return "default";
    };

    const initialValueFor = (parameter) => parameter.initialValue || defaultValueFor(parameter.type);

    const escapeCsharpString = (value) => value
      .replaceAll("\\", "\\\\")
      .replaceAll("\"", "\\\"");

    const builderChain = (parameters, builderClassName) => {
      if (!parameters.length) {
        return `new ${builderClassName}()\n    .Build()`;
      }

      const assignments = parameters
        .map((parameter, index) => {
          const separator = index === parameters.length - 1 ? "" : ",";
          return `${toPascalCase(parameter.name, "Value")} = ${initialValueFor(parameter)}${separator}`;
        })
        .join("\n");

      return `new ${builderClassName}()\n    .WithProps(props => props with\n    {\n${indent(assignments, 8)}\n    })\n    .Build()`;
    };

    const displayNameReturnStatement = (parameters, methodName) => {
      const parameterSummary = parameters
        .map((parameter) => `${parameter.name}={_props.${toPascalCase(parameter.name, "Value")}}`)
        .join(", ");
      const expression = parameterSummary ? `${methodName}: ${parameterSummary}` : methodName;
      return `return $"${escapeCsharpString(expression)}";`;
    };

    const generateCode = () => {
      const methodName = sanitizeIdentifier(functionNameInput.value, "TargetMethod");
      const methodPascal = toPascalCase(methodName, "TargetMethod");
      const parameters = uniqueParameters(parameterRows);
      const propsClassName = `${methodPascal}Props`;
      const caseClassName = `${methodPascal}TestCase`;
      const builderClassName = `${methodPascal}TestCaseBuilder`;
      const dataMethodName = `Get${methodPascal}TestCase`;
      const displayNameMethodName = `Get${methodPascal}DisplayName`;
      const propsProperties = parameters.map((parameter) => {
        const propertyName = toPascalCase(parameter.name, "Value");
        return `public ${parameter.type} ${propertyName} { get; init; } = ${initialValueFor(parameter)};`;
      }).join("\n");
      const dataCase = builderChain(parameters, builderClassName);
      const displayNameStatement = displayNameReturnStatement(parameters, methodName);
      const parameterSummary = parameters.length
        ? parameters.map((parameter) => `${parameter.name}: ${parameter.type}`).join(", ")
        : "パラメータなし";
      const propsPropertyBlock = propsProperties ? `${indent(propsProperties, 4)}\n` : "";

      const code = `public static IEnumerable<object[]> ${dataMethodName}()
{
    yield return new object[]
    {
${indent(dataCase, 8)}
    };
}

public static string ${displayNameMethodName}(MethodInfo _, object[] data)
{
    return ((${caseClassName})data[0]).DisplayName;
}

[TestMethod]
[DynamicData(nameof(${dataMethodName}), DynamicDataSourceType.Method, DynamicDataDisplayName = nameof(${displayNameMethodName}))]
public void ${methodPascal}_ReturnsExpected(${caseClassName} testCase)
{
}

public sealed record ${propsClassName}
{
${propsPropertyBlock}}

public sealed record ${caseClassName}(${propsClassName} Props, string DisplayName);

public sealed class ${builderClassName}
{
    private ${propsClassName} _props = new();
    private string _displayName = "";

    public ${builderClassName} WithProps(Func<${propsClassName}, ${propsClassName}> configure)
    {
        _props = configure(_props);
        return this;
    }

    public ${builderClassName} WithDisplayName(string displayName)
    {
        _displayName = displayName;
        return this;
    }

    public ${caseClassName} Build()
    {
        var autoDisplayName = CreateDisplayName();
        var displayName = string.IsNullOrEmpty(_displayName)
            ? autoDisplayName
            : $"{_displayName}\\n{autoDisplayName}";

        return new ${caseClassName}(_props, displayName);
    }

    private string CreateDisplayName()
    {
        ${displayNameStatement}
    }
}
`;

      return {
        code,
        methodPascal,
        parameterSummary
      };
    };

    const setStatus = (message, isWarning = false) => {
      status.textContent = message;
      status.classList.toggle("warning", isWarning);
      window.clearTimeout(setStatus.timer);
      setStatus.timer = window.setTimeout(() => {
        status.textContent = "";
        status.classList.remove("warning");
      }, 2400);
    };

    const renderParameterRows = () => {
      parameterList.textContent = "";
      parameterRows.forEach((parameter, index) => {
        const row = document.createElement("div");
        row.className = "parameter-row";
        row.dataset.index = String(index);

        const dragHandle = document.createElement("button");
        dragHandle.className = "icon-button drag-handle";
        dragHandle.type = "button";
        dragHandle.textContent = "::";
        dragHandle.title = "ドラッグして並び替え";
        dragHandle.ariaLabel = "ドラッグして並び替え";
        dragHandle.draggable = true;
        dragHandle.dataset.index = String(index);

        const nameInput = document.createElement("input");
        nameInput.value = parameter.name;
        nameInput.placeholder = "name";
        nameInput.autocomplete = "off";
        nameInput.ariaLabel = "パラメータ名";
        nameInput.dataset.index = String(index);
        nameInput.dataset.field = "name";

        const typeInput = document.createElement("input");
        typeInput.value = parameter.type;
        typeInput.placeholder = "string";
        typeInput.autocomplete = "off";
        typeInput.ariaLabel = "型";
        typeInput.dataset.index = String(index);
        typeInput.dataset.field = "type";

        const initialValueInput = document.createElement("input");
        initialValueInput.value = parameter.initialValue || "";
        initialValueInput.placeholder = defaultValueFor(parameter.type || "object");
        initialValueInput.autocomplete = "off";
        initialValueInput.ariaLabel = "初期値";
        initialValueInput.dataset.index = String(index);
        initialValueInput.dataset.field = "initialValue";

        const removeButton = document.createElement("button");
        removeButton.className = "icon-button remove-parameter";
        removeButton.type = "button";
        removeButton.textContent = "-";
        removeButton.title = "パラメータを削除";
        removeButton.ariaLabel = "パラメータを削除";
        removeButton.dataset.index = String(index);

        row.append(dragHandle, typeInput, nameInput, initialValueInput, removeButton);
        parameterList.append(row);
      });
    };

    const render = () => {
      const result = generateCode();
      previewCode.textContent = result.code;
      snippetTitle.textContent = `${result.methodPascal} DynamicData members`;
      previewMeta.textContent = result.parameterSummary;
    };

    const applyState = (state) => {
      const normalizedState = normalizeState(state);
      functionNameInput.value = normalizedState.functionName;
      parameterRows = cloneRows(normalizedState.parameterRows);
      renderParameterRows();
      render();
    };

    const clearDropTargets = () => {
      parameterList.querySelectorAll?.(".drop-target").forEach((row) => {
        row.classList.remove("drop-target");
      });
    };

    const moveParameterRow = (fromIndex, toIndex) => {
      if (!Number.isInteger(fromIndex) || !Number.isInteger(toIndex)) {
        return;
      }
      if (fromIndex < 0 || fromIndex >= parameterRows.length) {
        return;
      }

      const boundedToIndex = Math.max(0, Math.min(toIndex, parameterRows.length));
      if (fromIndex === boundedToIndex || fromIndex + 1 === boundedToIndex) {
        return;
      }

      const [parameter] = parameterRows.splice(fromIndex, 1);
      const nextIndex = fromIndex < boundedToIndex ? boundedToIndex - 1 : boundedToIndex;
      parameterRows.splice(nextIndex, 0, parameter);
      renderParameterRows();
      saveState();
      render();
    };

    const copyText = async (value) => {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        await navigator.clipboard.writeText(value);
        return;
      }

      const textArea = document.createElement("textarea");
      textArea.value = value;
      textArea.style.position = "fixed";
      textArea.style.left = "-9999px";
      document.body.append(textArea);
      textArea.focus();
      textArea.select();
      const copied = document.execCommand("copy");
      textArea.remove();
      if (!copied) {
        throw new Error("Clipboard copy failed");
      }
    };

    const copySnippet = async () => {
      try {
        await copyText(generateCode().code);
        setStatus("コピーしました");
      } catch (error) {
        setStatus("コピーできませんでした", true);
      }
    };

    parameterList.addEventListener("input", (event) => {
      const target = event.target;
      const index = Number(target.dataset.index);
      const field = target.dataset.field;
      if (!Number.isInteger(index) || !field) {
        return;
      }

      parameterRows[index][field] = target.value;
      if (field === "type") {
        const initialValueInput = target.closest(".parameter-row")?.querySelector?.("[data-field='initialValue']");
        if (initialValueInput) {
          initialValueInput.placeholder = defaultValueFor(target.value || "object");
        }
      }
      saveState();
      render();
    });

    parameterList.addEventListener("click", (event) => {
      const target = event.target.closest(".remove-parameter");
      if (!target) {
        return;
      }

      const index = Number(target.dataset.index);
      if (!Number.isInteger(index)) {
        return;
      }

      parameterRows.splice(index, 1);
      if (!parameterRows.length) {
        parameterRows.push({ type: "", name: "", initialValue: "" });
      }

      renderParameterRows();
      saveState();
      render();
    });

    parameterList.addEventListener("dragstart", (event) => {
      const handle = event.target.closest(".drag-handle");
      if (!handle) {
        return;
      }

      draggedParameterIndex = Number(handle.dataset.index);
      const row = handle.closest(".parameter-row");
      row?.classList.add("dragging");
      if (event.dataTransfer) {
        event.dataTransfer.effectAllowed = "move";
        event.dataTransfer.setData("text/plain", String(draggedParameterIndex));
      }
    });

    parameterList.addEventListener("dragover", (event) => {
      const row = event.target.closest(".parameter-row");
      if (!row || draggedParameterIndex === null) {
        return;
      }

      event.preventDefault();
      clearDropTargets();
      row.classList.add("drop-target");
      if (event.dataTransfer) {
        event.dataTransfer.dropEffect = "move";
      }
    });

    parameterList.addEventListener("drop", (event) => {
      const row = event.target.closest(".parameter-row");
      if (!row || draggedParameterIndex === null) {
        return;
      }

      event.preventDefault();
      const targetIndex = Number(row.dataset.index);
      const rect = row.getBoundingClientRect();
      const isAfterTarget = event.clientY > rect.top + rect.height / 2;
      moveParameterRow(draggedParameterIndex, targetIndex + (isAfterTarget ? 1 : 0));
      draggedParameterIndex = null;
      clearDropTargets();
    });

    parameterList.addEventListener("dragend", () => {
      draggedParameterIndex = null;
      clearDropTargets();
      parameterList.querySelectorAll?.(".dragging").forEach((row) => {
        row.classList.remove("dragging");
      });
    });

    addParameterButton.addEventListener("click", () => {
      parameterRows.push({ type: "", name: "", initialValue: "" });
      renderParameterRows();
      saveState();
      render();
    });

    functionNameInput.addEventListener("input", () => {
      saveState();
      render();
    });
    copyButton.addEventListener("click", copySnippet);
    clearButton.addEventListener("click", () => {
      if (!window.confirm("入力内容を初期状態に戻しますか？")) {
        return;
      }

      applyState(defaultState);
      saveState();
      setStatus("初期状態に戻しました");
    });

    applyState(loadState());
  </script>
</body>
</html>
