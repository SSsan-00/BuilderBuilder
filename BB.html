<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BuilderBuilder</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f4ef;
      --panel: #fffdfa;
      --ink: #1d2329;
      --muted: #62707d;
      --line: #d8d1c8;
      --accent: #0f766e;
      --accent-strong: #0b5c56;
      --code-bg: #17202a;
      --code-ink: #e8eef4;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    .app {
      display: grid;
      grid-template-columns: minmax(320px, 420px) minmax(0, 1fr);
      min-height: 100vh;
    }

    .controls {
      border-right: 1px solid var(--line);
      background: var(--panel);
      padding: 28px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }

    .mark {
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      border-radius: 8px;
      background: var(--ink);
      color: white;
      font-weight: 800;
      letter-spacing: 0;
    }

    h1 {
      margin: 0;
      font-size: 1.45rem;
      line-height: 1.15;
    }

    .field {
      display: grid;
      gap: 8px;
      margin-bottom: 18px;
    }

    label {
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 700;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: white;
      color: var(--ink);
      padding: 11px 12px;
      outline: none;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgb(15 118 110 / 14%);
    }

    textarea {
      min-height: 220px;
      resize: vertical;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      font-size: 0.9rem;
      line-height: 1.55;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 22px;
    }

    .button {
      border: 1px solid var(--accent);
      border-radius: 8px;
      background: var(--accent);
      color: white;
      cursor: pointer;
      font-weight: 800;
      min-height: 42px;
      padding: 10px 14px;
    }

    .button.secondary {
      background: transparent;
      color: var(--accent-strong);
    }

    .preview {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      padding: 28px;
      gap: 18px;
    }

    .preview-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .preview-bar h2 {
      margin: 0;
      font-size: 1rem;
      color: var(--muted);
    }

    .status {
      min-height: 1.3em;
      color: var(--accent-strong);
      font-size: 0.9rem;
      font-weight: 700;
    }

    .snippet {
      overflow: hidden;
      border: 1px solid #111923;
      border-radius: 8px;
      background: var(--code-bg);
      box-shadow: 0 18px 42px rgb(29 35 41 / 14%);
    }

    .snippet-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid rgb(255 255 255 / 10%);
      padding: 12px 16px;
      color: white;
    }

    .snippet-title {
      font-weight: 800;
    }

    .snippet-language {
      color: #91a4b7;
      font-size: 0.82rem;
      text-transform: uppercase;
    }

    .snippet-description {
      margin: 0;
      padding: 14px 16px 0;
      color: #b8c6d3;
      line-height: 1.55;
    }

    pre {
      margin: 0;
      overflow: auto;
      padding: 16px;
      color: var(--code-ink);
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      font-size: 0.92rem;
      line-height: 1.6;
      tab-size: 2;
    }

    @media (max-width: 820px) {
      .app {
        grid-template-columns: 1fr;
      }

      .controls {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="controls" aria-label="入力">
      <div class="brand">
        <div class="mark" aria-hidden="true">BB</div>
        <h1>BuilderBuilder</h1>
      </div>

      <div class="field">
        <label for="title">タイトル</label>
        <input id="title" value="fetch helper" autocomplete="off">
      </div>

      <div class="field">
        <label for="language">言語</label>
        <select id="language">
          <option>JavaScript</option>
          <option>TypeScript</option>
          <option>HTML</option>
          <option>CSS</option>
          <option>Python</option>
          <option>Shell</option>
        </select>
      </div>

      <div class="field">
        <label for="description">説明</label>
        <input id="description" value="JSON APIを呼び出すための小さな関数" autocomplete="off">
      </div>

      <div class="field">
        <label for="code">コード</label>
        <textarea id="code" spellcheck="false">async function requestJson(url) {
  const response = await fetch(url);

  if (!response.ok) {
    throw new Error(`Request failed: ${response.status}`);
  }

  return response.json();
}</textarea>
      </div>

      <div class="actions">
        <button class="button" id="copySnippet" type="button">HTMLをコピー</button>
        <button class="button secondary" id="downloadSnippet" type="button">HTMLを保存</button>
      </div>
    </section>

    <section class="preview" aria-label="プレビュー">
      <div class="preview-bar">
        <h2>プレビュー</h2>
        <div class="status" id="status" role="status" aria-live="polite"></div>
      </div>

      <article class="snippet" id="snippet">
        <header class="snippet-header">
          <div class="snippet-title" id="previewTitle"></div>
          <div class="snippet-language" id="previewLanguage"></div>
        </header>
        <p class="snippet-description" id="previewDescription"></p>
        <pre><code id="previewCode"></code></pre>
      </article>
    </section>
  </main>

  <script>
    const titleInput = document.querySelector("#title");
    const languageInput = document.querySelector("#language");
    const descriptionInput = document.querySelector("#description");
    const codeInput = document.querySelector("#code");
    const previewTitle = document.querySelector("#previewTitle");
    const previewLanguage = document.querySelector("#previewLanguage");
    const previewDescription = document.querySelector("#previewDescription");
    const previewCode = document.querySelector("#previewCode");
    const status = document.querySelector("#status");
    const copyButton = document.querySelector("#copySnippet");
    const downloadButton = document.querySelector("#downloadSnippet");

    const escapeHtml = (value) => value
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");

    const snippetHtml = () => {
      const title = escapeHtml(titleInput.value.trim() || "Untitled snippet");
      const language = escapeHtml(languageInput.value);
      const description = escapeHtml(descriptionInput.value.trim());
      const code = escapeHtml(codeInput.value.trimEnd());

      return `<article class="bb-snippet">
  <header>
    <strong>${title}</strong>
    <span>${language}</span>
  </header>
  ${description ? `<p>${description}</p>` : ""}
  <pre><code>${code}</code></pre>
</article>`;
    };

    const render = () => {
      previewTitle.textContent = titleInput.value.trim() || "Untitled snippet";
      previewLanguage.textContent = languageInput.value;
      previewDescription.textContent = descriptionInput.value.trim();
      previewDescription.hidden = !descriptionInput.value.trim();
      previewCode.textContent = codeInput.value.trimEnd();
    };

    const setStatus = (message) => {
      status.textContent = message;
      window.clearTimeout(setStatus.timer);
      setStatus.timer = window.setTimeout(() => {
        status.textContent = "";
      }, 2200);
    };

    const copySnippet = async () => {
      await navigator.clipboard.writeText(snippetHtml());
      setStatus("コピーしました");
    };

    const downloadSnippet = () => {
      const blob = new Blob([snippetHtml()], { type: "text/html" });
      const url = URL.createObjectURL(blob);
      const anchor = document.createElement("a");
      anchor.href = url;
      anchor.download = `${titleInput.value.trim() || "snippet"}.html`;
      anchor.click();
      URL.revokeObjectURL(url);
      setStatus("保存しました");
    };

    [titleInput, languageInput, descriptionInput, codeInput].forEach((input) => {
      input.addEventListener("input", render);
    });

    copyButton.addEventListener("click", copySnippet);
    downloadButton.addEventListener("click", downloadSnippet);

    render();
  </script>
</body>
</html>
