<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BuilderBuilder</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7f6;
      --panel: #ffffff;
      --ink: #172026;
      --muted: #61707c;
      --line: #d9e0e4;
      --accent: #0f766e;
      --accent-strong: #0b5c56;
      --warning: #9a3412;
      --code-bg: #111821;
      --code-bar: #172231;
      --code-ink: #ecf2f8;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
    }

    button,
    input {
      font: inherit;
    }

    .app {
      display: grid;
      grid-template-columns: minmax(340px, 480px) minmax(0, 1fr);
      min-height: 100vh;
    }

    .controls {
      border-right: 1px solid var(--line);
      background: var(--panel);
      padding: 28px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 26px;
    }

    .mark {
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      border-radius: 8px;
      background: var(--ink);
      color: white;
      font-weight: 800;
      letter-spacing: 0;
    }

    h1 {
      margin: 0;
      font-size: 1.45rem;
      line-height: 1.15;
    }

    .subtitle {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.45;
    }

    .field {
      display: grid;
      gap: 8px;
      margin-bottom: 17px;
    }

    label,
    .group-label {
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 750;
    }

    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: white;
      color: var(--ink);
      padding: 11px 12px;
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgb(15 118 110 / 14%);
    }

    .parameters {
      display: grid;
      gap: 10px;
      margin-bottom: 17px;
    }

    .parameter-head,
    .parameter-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) 42px;
      gap: 8px;
      align-items: center;
    }

    .parameter-head {
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 800;
      padding-right: 2px;
    }

    .parameter-row input {
      min-width: 0;
    }

    .icon-button {
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: white;
      color: var(--ink);
      cursor: pointer;
      font-size: 1.12rem;
      font-weight: 800;
      line-height: 1;
    }

    .icon-button:hover,
    .icon-button:focus {
      border-color: var(--accent);
      color: var(--accent-strong);
      outline: none;
    }

    .add-row {
      justify-self: start;
      color: var(--accent-strong);
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 22px;
    }

    .button {
      min-height: 42px;
      border: 1px solid var(--accent);
      border-radius: 8px;
      background: var(--accent);
      color: white;
      cursor: pointer;
      font-weight: 800;
      padding: 10px 14px;
    }

    .preview {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 18px;
      min-width: 0;
      padding: 28px;
    }

    .preview-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-width: 0;
    }

    .preview-title {
      display: grid;
      gap: 4px;
      min-width: 0;
    }

    .preview-title h2 {
      margin: 0;
      font-size: 1rem;
      color: var(--muted);
    }

    .meta {
      overflow: hidden;
      color: var(--ink);
      font-size: 0.92rem;
      font-weight: 800;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .status {
      min-height: 1.3em;
      color: var(--accent-strong);
      font-size: 0.9rem;
      font-weight: 800;
      text-align: right;
    }

    .status.warning {
      color: var(--warning);
    }

    .snippet {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      overflow: hidden;
      min-width: 0;
      border: 1px solid #0d131b;
      border-radius: 8px;
      background: var(--code-bg);
      box-shadow: 0 18px 42px rgb(23 32 38 / 14%);
    }

    .snippet-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid rgb(255 255 255 / 9%);
      background: var(--code-bar);
      padding: 12px 16px;
      color: white;
    }

    .snippet-title {
      overflow: hidden;
      font-weight: 800;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .snippet-language {
      color: #9fb0c1;
      font-size: 0.82rem;
      font-weight: 800;
      text-transform: uppercase;
    }

    pre {
      margin: 0;
      overflow: auto;
      min-width: 0;
      padding: 18px;
      color: var(--code-ink);
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      font-size: 0.88rem;
      line-height: 1.62;
      tab-size: 4;
    }

    @media (max-width: 860px) {
      .app {
        grid-template-columns: 1fr;
      }

      .controls {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .preview {
        min-height: 70vh;
      }
    }

    @media (max-width: 520px) {
      .parameter-head {
        display: none;
      }

      .parameter-row {
        grid-template-columns: 1fr 1fr 42px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="controls" aria-label="入力">
      <div class="brand">
        <div class="mark" aria-hidden="true">BB</div>
        <div>
          <h1>BuilderBuilder</h1>
          <p class="subtitle">MSTest DynamicData Builder</p>
        </div>
      </div>

      <div class="field">
        <label for="functionName">関数名</label>
        <input id="functionName" value="CalculatePrice" autocomplete="off">
      </div>

      <div class="parameters" aria-label="パラメータ">
        <div class="group-label">パラメータ</div>
        <div class="parameter-head" aria-hidden="true">
          <div>パラメータ名</div>
          <div>型</div>
          <div></div>
        </div>
        <div id="parameterList"></div>
        <button class="icon-button add-row" id="addParameter" type="button" title="パラメータを追加" aria-label="パラメータを追加">+</button>
      </div>

      <div class="actions">
        <button class="button" id="copySnippet" type="button">スニペットをコピー</button>
      </div>
    </section>

    <section class="preview" aria-label="プレビュー">
      <div class="preview-bar">
        <div class="preview-title">
          <h2>プレビュー</h2>
          <div class="meta" id="previewMeta"></div>
        </div>
        <div class="status" id="status" role="status" aria-live="polite"></div>
      </div>

      <article class="snippet">
        <header class="snippet-header">
          <div class="snippet-title" id="snippetTitle"></div>
          <div class="snippet-language">C# / MSTest</div>
        </header>
        <pre><code id="previewCode"></code></pre>
      </article>
    </section>
  </main>

  <script>
    const functionNameInput = document.querySelector("#functionName");
    const parameterList = document.querySelector("#parameterList");
    const addParameterButton = document.querySelector("#addParameter");
    const previewMeta = document.querySelector("#previewMeta");
    const previewCode = document.querySelector("#previewCode");
    const snippetTitle = document.querySelector("#snippetTitle");
    const status = document.querySelector("#status");
    const copyButton = document.querySelector("#copySnippet");

    let parameterRows = [
      { name: "amount", type: "decimal" },
      { name: "taxRate", type: "decimal" },
      { name: "roundingMode", type: "MidpointRounding" }
    ];

    const csharpKeywords = new Set([
      "abstract", "as", "base", "bool", "break", "byte", "case", "catch",
      "char", "checked", "class", "const", "continue", "decimal", "default",
      "delegate", "do", "double", "else", "enum", "event", "explicit",
      "extern", "false", "finally", "fixed", "float", "for", "foreach", "goto",
      "if", "implicit", "in", "int", "interface", "internal", "is", "lock",
      "long", "namespace", "new", "null", "object", "operator", "out",
      "override", "params", "private", "protected", "public", "readonly",
      "ref", "return", "sbyte", "sealed", "short", "sizeof", "stackalloc",
      "static", "string", "struct", "switch", "this", "throw", "true", "try",
      "typeof", "uint", "ulong", "unchecked", "unsafe", "ushort", "using",
      "virtual", "void", "volatile", "while"
    ]);

    const sanitizeIdentifier = (value, fallback) => {
      const normalized = (value || "")
        .trim()
        .replace(/[^A-Za-z0-9_]/g, "_")
        .replace(/_+/g, "_")
        .replace(/^_+|_+$/g, "");
      const safe = normalized || fallback;
      const prefixed = /^[A-Za-z_]/.test(safe) ? safe : `_${safe}`;
      return csharpKeywords.has(prefixed) ? `@${prefixed}` : prefixed;
    };

    const toPascalCase = (value, fallback) => {
      const safe = sanitizeIdentifier(value, fallback).replace(/^@/, "");
      return safe
        .split("_")
        .filter(Boolean)
        .map((part) => part.charAt(0).toUpperCase() + part.slice(1))
        .join("") || fallback;
    };

    const toPrivateFieldName = (name) => {
      const safe = sanitizeIdentifier(name, "value").replace(/^@/, "");
      return `_${safe.charAt(0).toLowerCase()}${safe.slice(1)}`;
    };

    const indent = (value, spaces) => {
      const padding = " ".repeat(spaces);
      return value.split("\n").map((line) => line ? `${padding}${line}` : line).join("\n");
    };

    const uniqueParameters = (rows) => {
      const used = new Map();
      return rows
        .map((row, index) => ({
          rawName: row.name.trim(),
          rawType: row.type.trim(),
          name: sanitizeIdentifier(row.name, `value${index + 1}`),
          type: row.type.trim() || "object"
        }))
        .filter((parameter) => parameter.rawName || parameter.rawType)
        .map((parameter) => {
          const count = used.get(parameter.name) || 0;
          used.set(parameter.name, count + 1);
          return count === 0 ? parameter : { ...parameter, name: `${parameter.name}${count + 1}` };
        });
    };

    const defaultValueFor = (type) => {
      const normalized = type.replace(/\?$/, "").trim().toLowerCase();
      if (normalized === "string") {
        return "\"\"";
      }
      if (normalized === "char") {
        return "'\\0'";
      }
      if (normalized === "bool" || normalized === "boolean") {
        return "false";
      }
      if (normalized === "decimal") {
        return "0m";
      }
      if (normalized === "float" || normalized === "single") {
        return "0f";
      }
      if (normalized === "double") {
        return "0d";
      }
      if (["byte", "sbyte", "short", "ushort", "int", "uint", "long", "ulong"].includes(normalized)) {
        return "0";
      }
      return "default";
    };

    const escapeCsharpString = (value) => value
      .replaceAll("\\", "\\\\")
      .replaceAll("\"", "\\\"");

    const methodArguments = (parameters) => parameters
      .map((parameter) => `testCase.${toPascalCase(parameter.name, "Value")}`)
      .join(",\n");

    const builderChain = (parameters, builderClassName) => {
      const calls = parameters
        .map((parameter) => `.With${toPascalCase(parameter.name, "Value")}(${defaultValueFor(parameter.type)})`);
      if (!calls.length) {
        return `new ${builderClassName}()\n    .Build()`;
      }

      return `new ${builderClassName}()\n${indent(calls.join("\n"), 4)}\n    .Build()`;
    };

    const displayNameReturnStatement = (parameters, methodName) => {
      const parameterSummary = parameters
        .map((parameter) => `${parameter.name}={${toPrivateFieldName(parameter.name)}}`)
        .join(", ");
      const expression = parameterSummary ? `${methodName}: ${parameterSummary}` : methodName;
      return `return $"${escapeCsharpString(expression)}";`;
    };

    const generateCode = () => {
      const methodName = sanitizeIdentifier(functionNameInput.value, "TargetMethod");
      const methodPascal = toPascalCase(methodName, "TargetMethod");
      const parameters = uniqueParameters(parameterRows);
      const caseClassName = `${methodPascal}Case`;
      const builderClassName = `${methodPascal}CaseBuilder`;
      const dataMethodName = `${methodPascal}Data`;
      const displayNameMethodName = `Get${methodPascal}DisplayName`;
      const parameterProperties = parameters.map((parameter) => {
        const propertyName = toPascalCase(parameter.name, "Value");
        return `public ${parameter.type} ${propertyName} { get; }`;
      }).join("\n");
      const constructorParameters = parameters
        .map((parameter) => `${parameter.type} ${parameter.name}`)
        .concat("string displayName")
        .join(", ");
      const constructorAssignments = parameters.map((parameter) => {
        const propertyName = toPascalCase(parameter.name, "Value");
        return `${propertyName} = ${parameter.name};`;
      }).concat("DisplayName = displayName;").join("\n");
      const fields = parameters.map((parameter) => {
        return `private ${parameter.type} ${toPrivateFieldName(parameter.name)} = ${defaultValueFor(parameter.type)};`;
      }).join("\n");
      const withMethods = parameters.map((parameter) => {
        const propertyName = toPascalCase(parameter.name, "Value");
        const fieldName = toPrivateFieldName(parameter.name);
        return `public ${builderClassName} With${propertyName}(${parameter.type} value)\n{\n    ${fieldName} = value;\n    return this;\n}`;
      }).join("\n\n");
      const buildArguments = parameters
        .map((parameter) => toPrivateFieldName(parameter.name))
        .concat("displayName")
        .join(", ");
      const callArguments = methodArguments(parameters);
      const methodCall = callArguments
        ? `${methodName}(\n${indent(callArguments, 8)});`
        : `${methodName}();`;
      const dataCase = builderChain(parameters, builderClassName);
      const displayNameStatement = displayNameReturnStatement(parameters, methodName);
      const parameterSummary = parameters.length
        ? parameters.map((parameter) => `${parameter.name}: ${parameter.type}`).join(", ")
        : "パラメータなし";
      const propertyBlock = parameterProperties ? `${indent(parameterProperties, 4)}\n` : "";
      const fieldBlock = fields ? `${indent(fields, 4)}\n` : "";
      const withMethodBlock = withMethods ? `\n${indent(withMethods, 4)}\n` : "";

      const code = `public static IEnumerable<object[]> ${dataMethodName}()
{
    yield return new object[]
    {
${indent(dataCase, 8)}
    };
}

public static string ${displayNameMethodName}(MethodInfo methodInfo, object[] data)
{
    if (data.Length > 0 && data[0] is ${caseClassName} testCase)
    {
        return testCase.DisplayName;
    }

    return methodInfo.Name;
}

[TestMethod]
[DynamicData(nameof(${dataMethodName}), DynamicDataSourceType.Method, DynamicDataDisplayName = nameof(${displayNameMethodName}))]
public void ${methodPascal}_ReturnsExpected(${caseClassName} testCase)
{
    var actual = ${methodCall}

    Assert.Fail("TODO: expected valueを検証してください。");
}

private sealed class ${caseClassName}
{
${propertyBlock}    public string DisplayName { get; }

    public ${caseClassName}(${constructorParameters})
    {
${indent(constructorAssignments, 8)}
    }
}

private sealed class ${builderClassName}
{
${fieldBlock}    private string _displayName = "";
${withMethodBlock}
    public ${builderClassName} WithDisplayName(string value)
    {
        _displayName = value;
        return this;
    }

    public ${caseClassName} Build()
    {
        var displayName = string.IsNullOrEmpty(_displayName)
            ? CreateDisplayName()
            : _displayName;
        return new ${caseClassName}(${buildArguments});
    }

    private string CreateDisplayName()
    {
        ${displayNameStatement}
    }
}
`;

      return {
        code,
        methodPascal,
        parameterSummary
      };
    };

    const setStatus = (message, isWarning = false) => {
      status.textContent = message;
      status.classList.toggle("warning", isWarning);
      window.clearTimeout(setStatus.timer);
      setStatus.timer = window.setTimeout(() => {
        status.textContent = "";
        status.classList.remove("warning");
      }, 2400);
    };

    const renderParameterRows = () => {
      parameterList.textContent = "";
      parameterRows.forEach((parameter, index) => {
        const row = document.createElement("div");
        row.className = "parameter-row";

        const nameInput = document.createElement("input");
        nameInput.value = parameter.name;
        nameInput.placeholder = "amount";
        nameInput.autocomplete = "off";
        nameInput.ariaLabel = "パラメータ名";
        nameInput.dataset.index = String(index);
        nameInput.dataset.field = "name";

        const typeInput = document.createElement("input");
        typeInput.value = parameter.type;
        typeInput.placeholder = "decimal";
        typeInput.autocomplete = "off";
        typeInput.ariaLabel = "型";
        typeInput.dataset.index = String(index);
        typeInput.dataset.field = "type";

        const removeButton = document.createElement("button");
        removeButton.className = "icon-button";
        removeButton.type = "button";
        removeButton.textContent = "-";
        removeButton.title = "パラメータを削除";
        removeButton.ariaLabel = "パラメータを削除";
        removeButton.dataset.index = String(index);

        row.append(nameInput, typeInput, removeButton);
        parameterList.append(row);
      });
    };

    const render = () => {
      const result = generateCode();
      previewCode.textContent = result.code;
      snippetTitle.textContent = `${result.methodPascal} DynamicData members`;
      previewMeta.textContent = result.parameterSummary;
    };

    const copyText = async (value) => {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        await navigator.clipboard.writeText(value);
        return;
      }

      const textArea = document.createElement("textarea");
      textArea.value = value;
      textArea.style.position = "fixed";
      textArea.style.left = "-9999px";
      document.body.append(textArea);
      textArea.focus();
      textArea.select();
      const copied = document.execCommand("copy");
      textArea.remove();
      if (!copied) {
        throw new Error("Clipboard copy failed");
      }
    };

    const copySnippet = async () => {
      try {
        await copyText(generateCode().code);
        setStatus("コピーしました");
      } catch (error) {
        setStatus("コピーできませんでした", true);
      }
    };

    parameterList.addEventListener("input", (event) => {
      const target = event.target;
      const index = Number(target.dataset.index);
      const field = target.dataset.field;
      if (!Number.isInteger(index) || !field) {
        return;
      }

      parameterRows[index][field] = target.value;
      render();
    });

    parameterList.addEventListener("click", (event) => {
      const target = event.target.closest("button");
      if (!target) {
        return;
      }

      const index = Number(target.dataset.index);
      if (!Number.isInteger(index)) {
        return;
      }

      parameterRows.splice(index, 1);
      if (!parameterRows.length) {
        parameterRows.push({ name: "", type: "" });
      }

      renderParameterRows();
      render();
    });

    addParameterButton.addEventListener("click", () => {
      parameterRows.push({ name: "", type: "" });
      renderParameterRows();
      render();
    });

    functionNameInput.addEventListener("input", render);
    copyButton.addEventListener("click", copySnippet);

    renderParameterRows();
    render();
  </script>
</body>
</html>
